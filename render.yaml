services:
  - type: web
    name: aegis-chatgpt-rpg
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: AEGIS_STORAGE_DRIVER
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: aegis-chatgpt-rpg-db
          property: connectionString
      - key: DATABASE_SSL
        value: "false"
      - key: AEGIS_MCP_PATH_SECRET
        sync: false
      - key: AEGIS_ENABLE_LEGACY_ADMIN
        value: "false"
      - key: AEGIS_MAX_STATE_BYTES
        value: "2097152"
      - key: AEGIS_MAX_DIFF_BYTES
        value: "524288"

databases:
  - name: aegis-chatgpt-rpg-db
    databaseName: aegis
    user: aegis
    plan: free
