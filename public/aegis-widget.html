<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AEGIS 儀表板</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0f16;
        --panel: #171d2a;
        --panel-2: #20283a;
        --panel-3: #111827;
        --line: #30394f;
        --text: #f4f7fc;
        --muted: #aab5c9;
        --accent: #82a8ff;
        --good: #70d99b;
        --warning: #e7c778;
      }
      * { box-sizing: border-box; }
      html, body { width: 100%; min-height: 100%; margin: 0; }
      body {
        padding: 12px;
        background: radial-gradient(circle at top right, #172449 0, var(--bg) 42%);
        color: var(--text);
        font: 14px/1.5 system-ui, -apple-system, "Segoe UI", "Noto Sans TC", sans-serif;
      }
      button, summary { font: inherit; -webkit-tap-highlight-color: transparent; }
      .shell { max-width: 760px; margin: 0 auto; }
      header { display: flex; gap: 12px; align-items: center; justify-content: space-between; margin-bottom: 12px; }
      h1 { margin: 0; font-size: 20px; letter-spacing: .02em; }
      .subtitle { color: var(--muted); font-size: 12px; }
      .hero, .card {
        border: 1px solid var(--line); border-radius: 16px;
        background: color-mix(in srgb, var(--panel) 92%, transparent); box-shadow: 0 12px 30px #0004;
      }
      .hero { padding: 16px; margin-bottom: 10px; }
      .hero-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
      .name { font-size: 24px; font-weight: 800; }
      .role, .location { color: var(--muted); }
      .revision { color: var(--accent); font: 12px ui-monospace, monospace; }
      .stats { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; margin-top: 14px; }
      .stat { padding: 9px; background: var(--panel-2); border-radius: 11px; min-width: 0; }
      .stat-label { color: var(--muted); font-size: 11px; }
      .stat-value { font-weight: 750; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      nav { display: flex; gap: 6px; overflow-x: auto; margin: 10px 0; padding-bottom: 3px; scrollbar-width: thin; }
      nav button {
        display: inline-flex; align-items: center; gap: 5px; flex: 0 0 auto; padding: 7px 11px;
        border: 1px solid var(--line); border-radius: 999px; background: var(--panel); color: var(--muted); cursor: pointer;
      }
      nav button[aria-selected="true"] { color: #071020; background: var(--accent); border-color: var(--accent); font-weight: 800; }
      .primary-nav { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); overflow: visible; }
      .primary-nav button { justify-content: center; width: 100%; }
      .secondary-nav[hidden] { display: none; }
      .secondary-nav { margin-top: -3px; padding: 7px; border: 1px solid var(--line); border-radius: 13px; background: #111827b8; }
      .tab-count { min-width: 17px; padding: 0 5px; border-radius: 999px; background: #ffffff18; font-size: 11px; text-align: center; }
      nav button[aria-selected="true"] .tab-count { background: #0710201f; }
      .panel { display: none; }
      .panel.active { display: block; }
      .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
      .card { padding: 13px; min-width: 0; }
      .card h2 { font-size: 15px; margin: 0 0 4px; }
      .section-intro { color: var(--muted); font-size: 12px; margin: 0 0 10px; }
      .inventory-tabs { display: flex; gap: 6px; overflow-x: auto; margin: 0 0 10px; padding-bottom: 2px; }
      .inventory-tabs button {
        flex: 0 0 auto; padding: 6px 10px; border: 1px solid var(--line); border-radius: 9px;
        background: var(--panel-3); color: var(--muted); cursor: pointer;
      }
      .inventory-tabs button[aria-selected="true"] { color: var(--text); border-color: var(--accent); background: #29416f; font-weight: 750; }
      .empty { color: var(--muted); padding: 14px; text-align: center; }
      .list { display: grid; gap: 7px; }
      .row { padding: 9px 10px; background: var(--panel-2); border-radius: 10px; }
      .row-head { display: flex; gap: 8px; justify-content: space-between; }
      .row-title { font-weight: 750; min-width: 0; overflow-wrap: anywhere; }
      .pill { flex: 0 0 auto; color: var(--accent); font-size: 12px; }
      .note { color: var(--muted); font-size: 12px; overflow-wrap: anywhere; }
      .entity {
        overflow: hidden; border: 1px solid transparent; border-radius: 12px;
        background: var(--panel-2); transition: border-color .15s ease, background .15s ease;
      }
      .entity[open] { border-color: #4b5d83; background: #1d2638; }
      .entity summary { list-style: none; cursor: pointer; padding: 11px 12px; }
      .entity summary::-webkit-details-marker { display: none; }
      .entity-summary { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
      .entity-heading { min-width: 0; }
      .entity-title { font-weight: 780; overflow-wrap: anywhere; }
      .entity-preview { color: var(--muted); font-size: 12px; overflow-wrap: anywhere; }
      .entity-meta { display: flex; align-items: center; gap: 8px; flex: 0 0 auto; }
      .entity-badge { color: var(--accent); font-size: 12px; white-space: nowrap; }
      .chevron { color: var(--muted); font-size: 16px; line-height: 1; transition: transform .15s ease; }
      .entity[open] .chevron { transform: rotate(180deg); }
      .entity-body { padding: 11px 12px 12px; border-top: 1px solid var(--line); }
      .detail-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
      .detail {
        min-width: 0; padding: 8px 9px; border: 1px solid #2d3850; border-radius: 9px; background: var(--panel-3);
      }
      .detail.wide { grid-column: 1 / -1; }
      .detail-label { margin-bottom: 2px; color: var(--muted); font-size: 11px; }
      .detail-value { overflow-wrap: anywhere; white-space: pre-wrap; }
      .detail-value.missing { color: #7f8aa0; font-style: italic; }
      .extra-title { margin: 11px 0 6px; color: var(--muted); font-size: 11px; font-weight: 700; }
      .ok { color: var(--good); }
      .warning { color: var(--warning); }
      .autosave { margin-top: 10px; color: var(--good); font-size: 12px; }
      #status { min-height: 18px; margin: 8px 2px 0; color: var(--muted); font-size: 12px; }
      .map-toolbar { display: flex; flex-wrap: wrap; gap: 7px; margin: 0 0 10px; }
      .map-toolbar button {
        min-height: 38px; padding: 7px 11px; border: 1px solid var(--line); border-radius: 10px;
        background: var(--panel-3); color: var(--muted); cursor: pointer;
      }
      .map-toolbar button[aria-selected="true"] { color: var(--text); border-color: var(--accent); background: #29416f; font-weight: 750; }
      .map-viewport {
        position: relative; height: 390px; overflow: hidden; border: 1px solid var(--line); border-radius: 13px;
        background: radial-gradient(circle at 50% 45%, #25375b 0, #101827 58%, #0c121e 100%);
      }
      .map-viewport[hidden], #map[hidden], .map-drawer[hidden] { display: none; }
      .map-svg { width: 100%; height: 100%; display: block; touch-action: none; user-select: none; }
      .map-hierarchy-line { stroke: #66738d; stroke-width: 1.4; stroke-dasharray: 4 5; opacity: .75; }
      .map-route-line { stroke: #82a8ff; stroke-width: 2; opacity: .8; marker-end: url(#route-arrow); }
      .map-route-line.heard { stroke-dasharray: 7 7; opacity: .55; }
      .map-route-line.verified { stroke-width: 3; opacity: 1; }
      .map-route-line.danger-high { stroke: #e48787; }
      .map-route-danger { fill: #ffd0d0; font: 800 14px system-ui, sans-serif; paint-order: stroke; stroke: #101827; stroke-width: 3px; }
      .map-node { cursor: pointer; outline: none; }
      .map-node rect { fill: #202a3e; stroke: #64718b; stroke-width: 1.5; rx: 12; }
      .map-node:hover rect, .map-node:focus rect { stroke: var(--accent); stroke-width: 2.5; }
      .map-node.current rect { fill: #29416f; stroke: #9ebaff; stroke-width: 3; }
      .map-node.heard rect { fill: #182131; stroke-dasharray: 5 4; }
      .map-node text { fill: var(--text); font: 700 13px system-ui, sans-serif; pointer-events: none; }
      .map-node .map-node-kind { fill: var(--muted); font-size: 10px; font-weight: 500; }
      .map-node .map-node-flags { fill: #c6d5f5; font-size: 9px; font-weight: 650; }
      .map-legend { display: flex; flex-wrap: wrap; gap: 6px 12px; margin-top: 8px; color: var(--muted); font-size: 11px; }
      .map-legend span::before { content: ""; display: inline-block; width: 18px; margin-right: 5px; vertical-align: middle; border-top: 2px solid var(--accent); }
      .map-legend .hierarchy::before { border-top-style: dashed; border-color: #66738d; }
      .map-legend .heard-route::before { border-top-style: dashed; }
      .map-drawer { margin-top: 9px; padding: 11px; border: 1px solid #4b5d83; border-radius: 12px; background: var(--panel-3); }
      .map-drawer-head { display: flex; justify-content: space-between; gap: 10px; align-items: start; margin-bottom: 7px; }
      .map-drawer-actions { display: flex; gap: 6px; align-items: center; }
      .map-drawer-title { font-weight: 800; }
      .map-drawer button { min-width: 38px; min-height: 38px; border: 1px solid var(--line); border-radius: 9px; background: var(--panel-2); color: var(--text); }
      @media (max-width: 560px) {
        body { padding: 8px; }
        .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .grid, .detail-grid { grid-template-columns: 1fr; }
        .detail.wide { grid-column: auto; }
        .hero { padding: 13px; }
        .entity summary { padding: 12px; }
        .primary-nav button { padding-inline: 7px; }
        .map-viewport { height: 330px; }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header>
        <div>
          <h1>AEGIS</h1>
          <div class="subtitle" id="world-title">等待權威狀態…</div>
        </div>
      </header>

      <section class="hero">
        <div class="hero-top">
          <div>
            <div class="name" id="player-name">未建立角色</div>
            <div class="role" id="player-role">—</div>
            <div class="location" id="player-location">—</div>
          </div>
          <div class="revision" id="revision">權威狀態同步中</div>
        </div>
        <div class="stats" id="stats"></div>
        <div class="autosave" id="autosave">進度已自動保存</div>
      </section>

      <nav class="primary-nav" aria-label="AEGIS 主要導覽">
        <button type="button" data-section="character" aria-selected="true">角色</button>
        <button type="button" data-section="adventure" aria-selected="false">冒險</button>
        <button type="button" data-section="knowledge" aria-selected="false">知識</button>
      </nav>
      <nav class="secondary-nav" data-section-nav="character" aria-label="角色資料">
        <button type="button" data-tab="overview" aria-selected="true">總覽</button>
        <button type="button" data-tab="inventory" aria-selected="false">背包 <span class="tab-count" id="inventory-count">0</span></button>
        <button type="button" data-tab="equipment" aria-selected="false">裝備 <span class="tab-count" id="equipment-count">0</span></button>
        <button type="button" data-tab="skills" aria-selected="false">技能 <span class="tab-count" id="skills-count">0</span></button>
      </nav>
      <nav class="secondary-nav" data-section-nav="adventure" aria-label="冒險資料" hidden>
        <button type="button" data-tab="quests" aria-selected="true">任務 <span class="tab-count" id="quests-count">0</span></button>
        <button type="button" data-tab="map" aria-selected="false">地圖 <span class="tab-count" id="map-count">0</span></button>
        <button type="button" data-tab="people" aria-selected="false">人物 <span class="tab-count" id="people-count">0</span></button>
      </nav>
      <nav class="secondary-nav" data-section-nav="knowledge" aria-label="知識資料" hidden>
        <button type="button" data-tab="compendium" aria-selected="true">圖鑑 <span class="tab-count" id="compendium-count">0</span></button>
      </nav>

      <section class="panel active" id="panel-overview">
        <div class="grid">
          <article class="card"><h2>角色屬性</h2><div class="list" id="attributes"></div></article>
          <article class="card"><h2>最近事件</h2><div class="list" id="history"></div></article>
        </div>
      </section>
      <section class="panel" id="panel-inventory">
        <article class="card">
          <h2>背包</h2>
          <p class="section-intro">點擊物品可查看數量、效果、來源與完整資料。</p>
          <div class="inventory-tabs" role="tablist" aria-label="物品分類">
            <button type="button" data-inventory-category="all" aria-selected="true">全部</button>
            <button type="button" data-inventory-category="consumable" aria-selected="false">消耗品</button>
            <button type="button" data-inventory-category="equipment" aria-selected="false">裝備</button>
            <button type="button" data-inventory-category="misc" aria-selected="false">雜物</button>
            <button type="button" data-inventory-category="special" aria-selected="false">特殊</button>
          </div>
          <div class="list" id="inventory"></div>
        </article>
      </section>
      <section class="panel" id="panel-equipment">
        <article class="card">
          <h2>裝備</h2>
          <p class="section-intro">依部位顯示目前裝備；點擊可查看能力、耐久與來源。</p>
          <div class="list" id="equipment"></div>
        </article>
      </section>
      <section class="panel" id="panel-skills">
        <article class="card">
          <h2>技能</h2>
          <p class="section-intro">點擊技能可查看等級、效果、消耗、來源與使用條件。</p>
          <div class="inventory-tabs" id="skill-tabs" role="tablist" aria-label="技能分類"></div>
          <div class="list" id="skills"></div>
        </article>
      </section>
      <section class="panel" id="panel-quests"><article class="card"><h2>任務</h2><div class="list" id="quests"></div></article></section>
      <section class="panel" id="panel-map">
        <article class="card">
          <h2>地圖</h2>
          <p class="section-intro">只顯示已知或聽聞地點與權威路線；前往地點須在正常遊戲回合中提出。</p>
          <div class="map-toolbar" role="group" aria-label="地圖檢視">
            <button type="button" data-map-view="graph" aria-selected="true">節點地圖</button>
            <button type="button" data-map-view="list" aria-selected="false">地點列表</button>
            <button type="button" id="map-zoom-out" aria-label="縮小地圖">－</button>
            <button type="button" id="map-zoom-in" aria-label="放大地圖">＋</button>
            <button type="button" id="map-recenter">重新置中</button>
            <button type="button" id="map-focus-current">回目前範圍</button>
          </div>
          <div class="map-viewport" id="map-graph" aria-label="玩家已知地點節點圖"></div>
          <div class="list" id="map" hidden></div>
          <div class="map-legend" id="map-legend">
            <span class="hierarchy">空間階層</span><span>已知單向路線</span><span class="heard-route">聽聞路線</span>
          </div>
          <div class="map-drawer" id="map-drawer" hidden></div>
        </article>
      </section>
      <section class="panel" id="panel-people">
        <article class="card">
          <h2>人物</h2>
          <p class="section-intro">只顯示角色合理知道的身份、關係、情報與目前或最後已知位置。</p>
          <div class="list" id="people"></div>
        </article>
      </section>
      <section class="panel" id="panel-compendium">
        <article class="card">
          <h2>圖鑑</h2>
          <p class="section-intro">知識會依傳聞、觀察、辨識、驗證與研究逐步更新。</p>
          <div class="inventory-tabs" id="compendium-tabs" role="tablist" aria-label="圖鑑分類"></div>
          <div class="list" id="compendium"></div>
        </article>
      </section>
      <div id="status" role="status"></div>
    </main>

    <script type="module">
      let dashboard = null;
      let inventoryItems = [];
      let inventoryCategory = "all";
      let skillItems = [];
      let skillCategory = "all";
      let compendiumItems = [];
      let compendiumCategory = "all";
      let mapView = "graph";
      let mapEntriesCache = [];
      let mapLocationCache = {};
      let mapTransform = { x: 0, y: 0, scale: 1 };
      let mapFocusId = "";
      let selectedMapId = "";
      let renderedDashboardKey = "";
      const latestRevisionByGame = new Map();
      let rpcId = 0;
      const pending = new Map();
      const $ = (id) => document.getElementById(id);

      const request = (method, params) => new Promise((resolve, reject) => {
        const id = ++rpcId;
        pending.set(id, { resolve, reject });
        window.parent.postMessage({ jsonrpc: "2.0", id, method, params }, "*");
      });
      const notify = (method, params) => window.parent.postMessage({ jsonrpc: "2.0", method, params }, "*");

      window.addEventListener("message", (event) => {
        if (event.source !== window.parent) return;
        const message = event.data;
        if (!message || message.jsonrpc !== "2.0") return;
        if (typeof message.id === "number") {
          const waiter = pending.get(message.id);
          if (!waiter) return;
          pending.delete(message.id);
          message.error ? waiter.reject(message.error) : waiter.resolve(message.result);
          return;
        }
        if (message.method === "ui/notifications/tool-result") update(message.params);
      }, { passive: true });

      const bridgeReady = request("ui/initialize", {
        appInfo: { name: "aegis-dashboard", version: "0.7.0" },
        appCapabilities: {},
        protocolVersion: "2026-01-26",
      }).then(() => notify("ui/notifications/initialized", {}));

      function update(response) {
        const candidate = response?.structuredContent?.result?.dashboard;
        if (!candidate?.game) return;
        const gameId = String(candidate.game.gameId || "");
        const revision = Number(candidate.game.revision);
        if (!gameId || !Number.isInteger(revision) || revision < 0) return;
        const turnId = String(candidate.turnId || "");
        const key = candidate.dashboardKey || (turnId
          ? `${gameId}:${turnId}:${revision}`
          : `${gameId}:${revision}`);
        const latest = latestRevisionByGame.get(gameId);
        if (key === renderedDashboardKey || (Number.isInteger(latest) && revision < latest)) return;
        latestRevisionByGame.set(gameId, Number.isInteger(latest) ? Math.max(latest, revision) : revision);
        renderedDashboardKey = key;
        dashboard = candidate;
        render();
      }

      function render() {
        const game = dashboard.game;
        const player = asRecord(game.player);
        const world = asRecord(game.world);
        const location = asRecord(player.location);
        const inventory = normalizeCollection(game.inventory)
          .filter(item => item.location !== "equipped" && item.equipped !== true)
          .map(item => ({ ...item, category: inventoryCategoryOf(item) }));
        const skills = normalizeNamedCollection(player.skills);
        const equipment = normalizeEquipment(player.equipment, player.equippedItems);
        const quests = normalizeCollection(game.quests);
        const mapEntries = normalizeCollection(game.map);
        const people = normalizeCollection(game.npcs);
        const compendium = normalizeCollection(game.compendium);

        $("world-title").textContent = [world.name || game.title, world.genre].filter(Boolean).join("｜");
        $("player-name").textContent = player.name || "未建立角色";
        $("player-role").textContent = [player.race, player.role || player.profession || player.identity || player.class].filter(Boolean).join("・") || "—";
        const authoritativePath = normalizeCollection(asRecord(game.mapIndex).currentPath).map(item => item.name).filter(present).join(" › ");
        $("player-location").textContent = authoritativePath || [
          location.region || player.region,
          location.location || player.place,
          location.sublocation || player.sublocation,
        ].filter(Boolean).join(" › ") || (typeof player.location === "string" ? player.location : "位置未知");
        $("revision").textContent = "權威狀態已同步";

        renderStats(player);
        renderObject($("attributes"), player.attributes, "尚無屬性資料");
        renderHistory($("history"), game.recentHistory || []);
        inventoryItems = inventory;
        renderInventoryCategory();
        renderEquipment($("equipment"), equipment);
        skillItems = skills;
        renderSkillTabs();
        renderSkillCategory();
        renderEntities($("quests"), quests, "目前沒有任務", item => ({
          title: pick(item, ["name", "title", "名稱"]) || "未命名任務",
          badge: pick(item, ["status", "狀態"]) || "",
          note: pick(item, ["description", "note", "描述", "資訊"]) || formatObjective(item.objectives),
        }));
        renderMap($("map"), mapEntries, location);
        renderPeople($("people"), people, mapEntries);
        compendiumItems = compendium;
        renderCompendiumTabs();
        renderCompendiumCategory();

        setCount("inventory-count", inventory.length);
        setCount("equipment-count", equipment.filter(entry => !entry.empty).length);
        setCount("skills-count", skills.length);
        setCount("quests-count", quests.length);
        setCount("map-count", mapEntries.length);
        setCount("people-count", people.length);
        setCount("compendium-count", compendium.length);
        const autoSave = asRecord(game.autoSave);
        $("autosave").textContent = autoSave.savedAt
          ? `進度已自動保存｜${formatDate(autoSave.savedAt)}`
          : "進度已自動保存";
        $("status").textContent = `最後更新：${formatDate(game.updatedAt)}`;
      }

      function renderStats(player) {
        const survival = asRecord(player.survival);
        const hunger = boundedMetric(survival.hunger, 100);
        const hydration = boundedMetric(survival.hydration, 100);
        const stats = [
          ["生命", resourceValue(player, "hp")], ["魔力", resourceValue(player, "mp")],
          ["體力", resourceValue(player, "sp")],
          ["等級", player.level ?? "—"], ["金錢", player.money ?? 0],
          ["飽食度", `${formatMetric(hunger)}／100｜${survivalStatus("hunger", hunger)}`],
          ["補水度", `${formatMetric(hydration)}／100｜${survivalStatus("hydration", hydration)}`],
          ["日期", player.date ?? "—"], ["時間", player.time ?? "—"],
          ["季節", player.season ?? "—"], ["天氣", player.weather ?? "—"],
        ];
        const root = $("stats"); root.replaceChildren();
        for (const [label, value] of stats) {
          const cell = el("div", "stat");
          cell.append(el("div", "stat-label", label), el("div", "stat-value", display(value)));
          root.append(cell);
        }
      }

      function renderInventory(root, items) {
        root.replaceChildren();

      function inventoryCategoryOf(item) {
        const explicit = String(pick(item, ["category", "分類"]) || "").trim().toLowerCase();
        const aliases = {
          consumable: "consumable", food: "consumable", drink: "consumable", potion: "consumable",
          "消耗品": "consumable", "食物": "consumable", "飲品": "consumable", "飲料": "consumable", "藥水": "consumable",
          equipment: "equipment", equip: "equipment", weapon: "equipment", armor: "equipment",
          "裝備": "equipment", "武器": "equipment", "防具": "equipment",
          misc: "misc", material: "misc", loot: "misc", tool: "misc", document: "misc",
          "雜物": "misc", "素材": "misc", "材料": "misc", "工具": "misc", "文件": "misc",
          special: "special", quest: "special", quest_item: "special", key: "special", key_item: "special",
          "特殊": "special", "任務道具": "special", "鑰匙": "special",
        };
        if (aliases[explicit]) return aliases[explicit];
        const type = String(pick(item, ["type", "類型"]) || "").trim().toLowerCase();
        if (aliases[type]) return aliases[type];
        if (item.questItem === true || item.keyItem === true || item.unsellable === true || item.undroppable === true) return "special";
        if (item.equippable === true || present(item.slot) || present(item.equipmentSlot)) return "equipment";
        if (item.consumable === true || present(item.hungerRestore) || present(item.hydrationRestore) || present(item.usesRemaining)) return "consumable";
        return "misc";
      }

      function categoryLabel(category) {
        return { consumable: "消耗品", equipment: "裝備", misc: "雜物", special: "特殊" }[category] || "雜物";
      }

      function boundedMetric(value, fallback) {
        const number = Number(value);
        return Number.isFinite(number) ? Math.min(100, Math.max(0, number)) : fallback;
      }

      function formatMetric(value) { return Number.isInteger(value) ? String(value) : value.toFixed(2).replace(/0+$/, "").replace(/\.$/, ""); }

      function survivalStatus(metric, value) {
        if (value >= 75) return "狀態良好";
        if (metric === "hunger") {
          if (value >= 50) return "稍有飢餓";
          if (value >= 25) return "明顯飢餓";

      function renderMap(root, entries, playerLocation) {
        mapEntriesCache = entries.slice(0, 40);
        mapLocationCache = asRecord(playerLocation);
        mapTransform = { x: 0, y: 0, scale: 1 };
        mapFocusId = String(mapLocationCache.mapId || "");
        selectedMapId = "";
        $("map-drawer").hidden = true;
        renderMapView();
      }

      function renderMapView() {
        const graph = $("map-graph");
        const list = $("map");
        const graphMode = mapView === "graph";
        graph.hidden = !graphMode;
        list.hidden = graphMode;
        $("map-legend").hidden = !graphMode;
        $("map-recenter").hidden = !graphMode;
        $("map-focus-current").hidden = !graphMode;
        $("map-zoom-out").hidden = !graphMode;
        $("map-zoom-in").hidden = !graphMode;
        document.querySelectorAll("[data-map-view]").forEach(button =>
          button.setAttribute("aria-selected", String(button.dataset.mapView === mapView)));
        if (graphMode) renderMapGraph(graph, localMapEntries(mapEntriesCache, mapFocusId), mapLocationCache);
        else renderMapList(list, mapEntriesCache, mapLocationCache);
      }

      function localMapEntries(entries, focusId) {
        if (!focusId || entries.length <= 1) return entries;
        const byId = new Map(entries.map(item => [String(item.mapId || ""), item]));
        const focus = byId.get(focusId);
        if (!focus) return entries;
        const included = new Set([focusId]);
        const include = id => { if (id && byId.has(String(id))) included.add(String(id)); };
        include(focus.parentMapId);
        let ancestor = focus;
        while (ancestor?.parentMapId) {
          include(ancestor.parentMapId);
          ancestor = byId.get(String(ancestor.parentMapId));
        }
        for (const item of entries) {
          if (item.parentMapId === focusId || (focus.parentMapId && item.parentMapId === focus.parentMapId)) include(item.mapId);
          for (const route of normalizeCollection(item.routes)) {
            if (item.mapId === focusId) include(route.toMapId);
            if (route.toMapId === focusId) include(item.mapId);
          }
        }
        return entries.filter(item => included.has(String(item.mapId || "")));
      }

      function renderMapList(root, entries, playerLocation) {
        root.replaceChildren();
        const byId = new Map(entries.map(item => [String(item.mapId || ""), item]));
        const currentMapId = String(playerLocation.mapId || "");
        root.append(row("目前位置", "", formatPlayerLocation(playerLocation, byId)));
        if (!entries.length) return root.append(el("div", "empty", "尚無已知或聽聞地點"));
        const ordered = [...entries].sort((left, right) => mapDepth(left, byId) - mapDepth(right, byId) || String(left.mapId).localeCompare(String(right.mapId)));
        for (const item of ordered) {
          const mapId = String(item.mapId || "");
          const current = mapId && mapId === currentMapId;
          root.append(expandable({
            title: String(item.name || "未命名地點"),
            badge: current ? "目前位置" : discoveryLabel(item.discovery),
            note: [mapPath(item, byId), item.description].filter(present).map(display).join("・") || "已記錄地點",
            fields: mapDetailFields(item, byId),
            extras: [],
          }));
        }
      }

      function renderMapGraph(root, entries, playerLocation) {
        root.replaceChildren();
        if (!entries.length) return root.append(el("div", "empty", "尚無已知或聽聞地點"));
        const byId = new Map(entries.map(item => [String(item.mapId || ""), item]));
        const currentMapId = String(playerLocation.mapId || "");
        const centerMapId = byId.has(currentMapId) ? currentMapId : String(mapFocusId || "");
        const svg = svgEl("svg");
        svg.classList.add("map-svg");
        svg.setAttribute("role", "img");
        svg.setAttribute("aria-label", `局部節點地圖，目前位置：${formatPlayerLocation(playerLocation, byId)}`);
        const defs = svgEl("defs");
        const marker = svgEl("marker");
        marker.setAttribute("id", "route-arrow");
        marker.setAttribute("markerWidth", "8");
        marker.setAttribute("markerHeight", "8");
        marker.setAttribute("refX", "7");
        marker.setAttribute("refY", "3");
        marker.setAttribute("orient", "auto");
        const arrow = svgEl("path");
        arrow.setAttribute("d", "M0,0 L0,6 L7,3 z");
        arrow.setAttribute("fill", "#82a8ff");
        marker.append(arrow);
        defs.append(marker);
        const viewport = svgEl("g");
        const hierarchyLayer = svgEl("g");
        const routeLayer = svgEl("g");
        const nodeLayer = svgEl("g");
        const positions = new Map(entries.map(item => [String(item.mapId || ""), stableMapPosition(item, byId)]));

        for (const item of entries) {
          const id = String(item.mapId || "");
          const position = positions.get(id);
          const parentPosition = positions.get(String(item.parentMapId || ""));
          if (position && parentPosition) hierarchyLayer.append(mapLine(parentPosition, position, "map-hierarchy-line"));
          for (const route of normalizeCollection(item.routes)) {
            const targetPosition = positions.get(String(route.toMapId || ""));
            if (!position || !targetPosition) continue;
            const status = route.knowledgeStatus === "heard" ? "heard" : route.knowledgeStatus === "verified" ? "verified" : "known";
            const danger = route.danger === "high" || route.danger === "extreme" ? " danger-high" : "";
            routeLayer.append(mapLine(position, targetPosition, `map-route-line ${status}${danger}`, true));
            if (danger) routeLayer.append(mapRouteDanger(position, targetPosition));
          }
        }

        for (const item of entries) {
          const id = String(item.mapId || "");
          const position = positions.get(id);
          if (!position) continue;
          const group = svgEl("g");
          group.classList.add("map-node");
          if (id === currentMapId) group.classList.add("current");
          if (item.discovery === "heard") group.classList.add("heard");
          group.dataset.mapId = id;
          group.setAttribute("transform", `translate(${position.x} ${position.y})`);
          group.setAttribute("tabindex", "0");
          group.setAttribute("role", "button");
          group.setAttribute("aria-label", `${item.name || "未命名地點"}，${id === currentMapId ? "目前位置" : discoveryLabel(item.discovery)}`);
          const rect = svgEl("rect");
          rect.setAttribute("width", "144");
          rect.setAttribute("height", "68");
          const title = svgEl("text");
          title.setAttribute("x", "12");
          title.setAttribute("y", "23");
          title.textContent = truncateMapLabel(String(item.name || "未命名地點"));
          const kind = svgEl("text");
          kind.classList.add("map-node-kind");
          kind.setAttribute("x", "12");
          kind.setAttribute("y", "40");
          kind.textContent = `${mapKindLabel(item.kind)}・${discoveryLabel(item.discovery)}`;
          const flags = svgEl("text");
          flags.classList.add("map-node-flags");
          flags.setAttribute("x", "12");
          flags.setAttribute("y", "56");
          flags.textContent = mapNodeFlags(item, id === currentMapId);
          const open = () => showMapDrawer(id, byId);
          group.addEventListener("click", open);
          group.addEventListener("keydown", event => {
            if (event.key === "Enter" || event.key === " ") { event.preventDefault(); open(); }
          });
          group.append(rect, title, kind, flags);
          nodeLayer.append(group);
        }

        viewport.append(hierarchyLayer, routeLayer, nodeLayer);
        svg.append(defs, viewport);
        root.append(svg);
        installMapPanZoom(svg, viewport);
        centerMapGraph(root, viewport, positions, centerMapId);
      }

      function stableMapPosition(item, byId) {
        const id = String(item.mapId || "unknown");
        const hash = stableStringHash(id);
        const depth = mapDepth(item, byId);
        return {
          x: 70 + depth * 185 + ((hash >>> 8) % 3) * 25,
          y: 55 + (hash % 19) * 76,
        };
      }

      function stableStringHash(value) {
        let hash = 2166136261;
        for (let index = 0; index < value.length; index += 1) {
          hash ^= value.charCodeAt(index);
          hash = Math.imul(hash, 16777619);
        }
        return hash >>> 0;
      }

      function mapLine(from, to, className, directed = false) {
        const line = svgEl("line");
        line.setAttribute("x1", String(from.x + 72));
        line.setAttribute("y1", String(from.y + 34));
        line.setAttribute("x2", String(to.x + (directed ? 2 : 72)));
        line.setAttribute("y2", String(to.y + 34));
        line.setAttribute("class", className);
        return line;
      }

      function mapRouteDanger(from, to) {
        const warning = svgEl("text");
        warning.setAttribute("x", String((from.x + to.x) / 2 + 72));
        warning.setAttribute("y", String((from.y + to.y) / 2 + 27));
        warning.setAttribute("class", "map-route-danger");
        warning.textContent = "⚠";
        return warning;
      }

      function mapNodeFlags(item, current) {
        const flags = [];
        if (current) flags.push("目前");
        if (normalizeCollection(item.facilities).length) flags.push("設施");
        if (normalizeCollection(asRecord(item.referenceLabels).quests).length) flags.push("任務");
        if (normalizeCollection(item.knownDangers).length) flags.push("危險");
        return flags.length ? flags.join("・") : "無額外標記";
      }

      function installMapPanZoom(svg, viewport) {
        let drag = null;
        svg.onpointerdown = event => {
          if (event.target.closest?.(".map-node")) return;
          drag = { id: event.pointerId, x: event.clientX, y: event.clientY };
          svg.setPointerCapture(event.pointerId);
        };
        svg.onpointermove = event => {
          if (!drag || drag.id !== event.pointerId) return;
          mapTransform.x += event.clientX - drag.x;
          mapTransform.y += event.clientY - drag.y;
          drag = { id: drag.id, x: event.clientX, y: event.clientY };
          applyMapTransform(viewport);
        };
        svg.onpointerup = svg.onpointercancel = event => {
          if (drag?.id === event.pointerId) drag = null;
        };
        svg.onwheel = event => {
          event.preventDefault();
          zoomMap(viewport, event.deltaY < 0 ? 1.12 : 0.89, event.offsetX, event.offsetY);
        };
      }

      function zoomMap(viewport, factor, originX, originY) {
        const previous = mapTransform.scale;
        const next = Math.min(2.2, Math.max(.55, previous * factor));
        mapTransform.x = originX - (originX - mapTransform.x) * (next / previous);
        mapTransform.y = originY - (originY - mapTransform.y) * (next / previous);
        mapTransform.scale = next;
        applyMapTransform(viewport);
      }

      function applyMapTransform(viewport) {
        viewport.setAttribute("transform", `translate(${mapTransform.x} ${mapTransform.y}) scale(${mapTransform.scale})`);
      }

      function centerMapGraph(root, viewport, positions, currentMapId) {
        const target = positions.get(currentMapId) || positions.values().next().value || { x: 0, y: 0 };
        const bounds = root.getBoundingClientRect();
        mapTransform = { x: bounds.width / 2 - (target.x + 72), y: bounds.height / 2 - (target.y + 34), scale: 1 };
        applyMapTransform(viewport);
      }

      function recenterMap() {
        if (mapView !== "graph") return;
        renderMapGraph($("map-graph"), localMapEntries(mapEntriesCache, mapFocusId), mapLocationCache);
      }

      function showMapDrawer(mapId, byId) {
        selectedMapId = mapId;
        const item = byId.get(mapId);
        if (!item) return;
        const drawer = $("map-drawer");
        drawer.replaceChildren();
        const head = el("div", "map-drawer-head");
        const heading = el("div", "");
        heading.append(el("div", "map-drawer-title", String(item.name || "未命名地點")), el("div", "note", mapPath(item, byId)));
        const close = el("button", "", "×");
        close.type = "button";
        close.setAttribute("aria-label", "關閉地點詳情");
        close.addEventListener("click", () => { selectedMapId = ""; drawer.hidden = true; });
        const focus = el("button", "", "查看此處範圍");
        focus.type = "button";
        focus.addEventListener("click", () => {
          mapFocusId = mapId;
          renderMapView();
        });
        const actions = el("div", "map-drawer-actions");
        actions.append(focus, close);
        head.append(heading, actions);
        const details = el("div", "detail-grid");
        for (const fieldValue of mapDetailFields(item, byId)) {
          if (!fieldValue.always && !present(fieldValue.value)) continue;
          const box = el("div", `detail${fieldValue.wide ? " wide" : ""}`);
          box.append(el("div", "detail-label", fieldValue.label), el("div", "detail-value", present(fieldValue.value) ? display(fieldValue.value) : "尚未記錄"));
          details.append(box);
        }
        drawer.append(head, details);
        drawer.hidden = false;
      }

      function mapDetailFields(item, byId) {
        return [
          field("地點層級", mapKindLabel(item.kind), true),
          field("得知狀態", discoveryLabel(item.discovery), true),
          field("所屬位置", mapPath(item, byId)),
          field("已知設施", formatFacilities(item.facilities), false, true),
          field("地點危險", formatKnownDangers(item.knownDangers), false, true),
          field("已知路線", formatRoutes(item.routes, byId) || "尚無權威路線資料", true, true),
          field("相關人物", formatResolvedNames(asRecord(item.referenceLabels).npcs), false, true),
          field("相關任務", formatResolvedNames(asRecord(item.referenceLabels).quests), false, true),
          field("相關圖鑑", formatResolvedNames(asRecord(item.referenceLabels).compendium), false, true),
          field("地點資訊", item.description, false, true),
        ];
      }

      function renderPeople(root, people, mapEntries) {
        root.replaceChildren();
        if (!people.length) return root.append(el("div", "empty", "尚未認識或聽聞任何人物"));
        const mapById = new Map(mapEntries.map(item => [String(item.mapId || ""), item]));
        for (const person of people) {
          const location = asRecord(person.location);
          const information = formatKnownInformation(person.knownInformation);
          const services = formatServices(person.services);
          const memories = formatMemories(person.memories);
          root.append(expandable({
            title: String(person.name || "未命名人物"),
            badge: familiarityLabel(person.familiarity),
            note: [person.identity, person.locationSummary || formatNpcLocation(location, mapById)].filter(present).map(display).join("・") || "已知人物",
            fields: [
              field("身份", person.identity),
              field("熟悉程度", familiarityLabel(person.familiarity), true),
              field("關係", person.relationshipLabel || asRecord(person.relationship).label),
              field(location.status === "current" ? "目前位置" : "最後已知位置", person.locationSummary || formatNpcLocation(location, mapById)),
              field("已知情報", information, false, true),
              field("可用服務", services, false, true),
              field("重要互動記憶", memories, false, true),
              field("任務關聯", formatResolvedNames(person.questNames), false, true),
            ],
            extras: [],
          }));
        }
      }

      function renderCompendiumTabs() {
        const root = $("compendium-tabs");
        root.replaceChildren();
        const categories = [];
        const seen = new Set();
        for (const entry of compendiumItems) {
          const id = String(entry.category || "other");
          if (seen.has(id)) continue;
          seen.add(id);
          categories.push({ id, label: entry.categoryLabel || compendiumCategoryLabel(id) });
        }
        if (compendiumCategory !== "all" && !seen.has(compendiumCategory)) compendiumCategory = "all";
        for (const category of [{ id: "all", label: "全部" }, ...categories]) {
          const button = el("button", "", category.label);
          button.type = "button";
          button.dataset.compendiumCategory = category.id;
          button.setAttribute("aria-selected", String(compendiumCategory === category.id));
          button.addEventListener("click", () => {
            compendiumCategory = category.id;
            root.querySelectorAll("button").forEach(item => item.setAttribute("aria-selected", String(item === button)));
            renderCompendiumCategory();
          });
          root.append(button);
        }
      }

      function renderCompendiumCategory() {
        const entries = compendiumCategory === "all"
          ? compendiumItems
          : compendiumItems.filter(item => String(item.category || "other") === compendiumCategory);
        renderCompendium($("compendium"), entries);
      }

      function renderCompendium(root, entries) {
        root.replaceChildren();
        if (!entries.length) {
          const message = compendiumCategory === "all" ? "尚未收錄圖鑑條目" : "此分類尚未收錄圖鑑條目";
          return root.append(el("div", "empty", message));
        }
        for (const entry of entries) {
          root.append(expandable({
            title: String(entry.name || "未命名條目"),
            badge: knowledgeStageLabel(entry.stage),
            note: [entry.categoryLabel || compendiumCategoryLabel(entry.category), entry.summary].filter(present).map(display).join("・") || "已收錄知識",
            fields: [
              field("分類", entry.categoryLabel || compendiumCategoryLabel(entry.category), true),
              field("研究階段", knowledgeStageLabel(entry.stage), true),
              field("摘要", entry.summary, false, true),
              field("已知事實", formatCompendiumFacts(entry.facts), false, true),
              field("相關地點", formatResolvedNames(asRecord(entry.relatedNames).maps), false, true),
              field("相關人物", formatResolvedNames(asRecord(entry.relatedNames).npcs), false, true),
              field("相關任務", formatResolvedNames(asRecord(entry.relatedNames).quests), false, true),
              field("次級標籤", formatStringList(entry.tags), false, true),
            ],
            extras: [],
          }));
        }
      }

      function formatPlayerLocation(location, byId) {
        const mapped = byId.get(String(location.mapId || ""));
        const hierarchy = mapped ? mapPath(mapped, byId) : "";
        return hierarchy || [location.region, location.location, location.sublocation].filter(present).map(display).join(" › ") || "位置未知";
      }

      function mapPath(item, byId) {
        const names = [];
        const visited = new Set();
        let current = item;
        while (current && !visited.has(current.mapId)) {
          if (current.name) names.unshift(String(current.name));
          visited.add(current.mapId);
          current = current.parentMapId ? byId.get(String(current.parentMapId)) : undefined;
        }
        return names.join(" › ");
      }

      function mapDepth(item, byId) {
        let depth = 0;
        const visited = new Set();
        let current = item;
        while (current?.parentMapId && !visited.has(current.parentMapId)) {
          visited.add(current.parentMapId);
          current = byId.get(String(current.parentMapId));
          depth += 1;
        }
        return depth;
      }

      function formatRoutes(value, byId) {
        if (!Array.isArray(value) || !value.length) return undefined;
        return value.map(raw => {
          const route = asRecord(raw);
          const target = byId.get(String(route.toMapId || ""));
          const details = [];
          if (Number.isInteger(route.estimatedMinutes)) details.push(`預估時間：${formatTravelMinutes(route.estimatedMinutes)}`);
          if (present(route.travelMode)) details.push(`方式：${travelModeLabel(route.travelMode)}`);
          if (present(route.knowledgeStatus)) details.push(`路線情報：${routeKnowledgeLabel(route.knowledgeStatus)}`);
          if (present(route.danger)) details.push(`危險：${dangerLabel(route.danger)}`);
          if (Array.isArray(route.conditions) && route.conditions.length) details.push(`狀況：${formatStringList(route.conditions)}`);
          if (Array.isArray(route.requirements) && route.requirements.length) details.push(`條件：${formatStringList(route.requirements)}`);
          if (present(route.notes)) details.push(display(route.notes));
          return `前往 ${target?.name || "已知目的地"}${details.length ? `｜${details.join("；")}` : ""}`;
        }).join("\n");
      }

      function formatFacilities(value) {
        if (!Array.isArray(value) || !value.length) return undefined;
        return value.map(raw => {
          if (typeof raw === "string") return raw;
          const facility = asRecord(raw);
          return [facility.name, facility.type ? localizePrimitive(facility.type) : "", facility.availability].filter(present).map(display).join("｜");
        }).filter(present).join("、");
      }

      function formatKnownDangers(value) {
        if (!Array.isArray(value) || !value.length) return undefined;
        return value.map(raw => {
          const danger = asRecord(raw);
          const details = [danger.name, present(danger.severity) ? dangerLabel(danger.severity) : "", danger.description];
          if (danger.confirmed === true) details.push("已確認");
          return details.filter(present).map(display).join("｜");
        }).filter(present).join("\n");
      }

      function formatNpcLocation(location, mapById) {
        const mapped = mapById.get(String(location.mapId || ""));
        const name = mapped?.name || location.name;
        if (!present(name)) return undefined;
        return `${display(name)}${location.status === "last_known" ? "（最後已知）" : location.status === "unknown" ? "（位置未確認）" : ""}`;
      }

      function formatKnownInformation(value) {
        if (!Array.isArray(value) || !value.length) return undefined;
        return value.map(raw => {
          const info = asRecord(raw);
          const parts = [info.content || info.text];
          if (present(info.confidence)) parts.push(`可信程度：${confidenceLabel(info.confidence)}`);
          if (present(info.sourceType)) parts.push(`來源：${sourceTypeLabel(info.sourceType)}`);
          return parts.filter(present).map(display).join("｜");
        }).join("\n");
      }

      function formatServices(value) {
        if (!Array.isArray(value) || !value.length) return undefined;
        return value.map(raw => typeof raw === "string" ? raw : [asRecord(raw).name, asRecord(raw).conditions, asRecord(raw).availability].filter(present).map(display).join("｜")).join("、");
      }

      function formatMemories(value) {
        if (!Array.isArray(value) || !value.length) return undefined;
        return value.map(raw => asRecord(raw).summary).filter(present).map(display).join("\n");
      }

      function formatKnowledgeSources(value) {
        if (!Array.isArray(value) || !value.length) return "來源尚未記錄";
        return value.map(formatKnowledgeSource).filter(present).join("\n") || "來源尚未記錄";
      }

      function formatKnowledgeSource(raw) {
        if (typeof raw === "string") return raw;
        const source = asRecord(raw);
        const type = sourceTypeLabel(source.sourceType || source.type);
        return present(source.description) ? `${type}：${display(source.description)}` : type;
      }

      function sourceTypeLabel(value) {
        return {
          rumor: "傳聞", npc: "人物告知", observation: "親自觀察", skill: "技能辨識",
          book: "書籍", document: "文件", experiment: "實驗", quest: "任務", other: "其他來源",
        }[value] || "知識來源";
      }

      function formatCompendiumFacts(value) {
        if (!Array.isArray(value) || !value.length) return "目前只有條目摘要，尚無已確認知識細節";
        return value.map(raw => {
          const fact = asRecord(raw);
          return `${fact.text || "未命名知識"}｜可信程度：${confidenceLabel(fact.confidence)}｜來源：${formatKnowledgeSources(fact.sources)}`;
        }).join("\n");
      }

      function formatResolvedNames(value) {
        if (!Array.isArray(value) || !value.length) return undefined;
        return value.map(raw => typeof raw === "string" ? raw : asRecord(raw).name).filter(present).map(display).join("、");
      }

      function formatTravelMinutes(value) {
        const minutes = Math.max(0, Math.round(Number(value) || 0));
        const hours = Math.floor(minutes / 60);
        const remainder = minutes % 60;
        if (hours && remainder) return `${hours} 小時 ${remainder} 分鐘`;
        return hours ? `${hours} 小時` : `${remainder} 分鐘`;
      }

      function travelModeLabel(value) {
        return { walk: "步行", ride: "騎乘", boat: "乘船", other: "其他" }[value] || "未記錄";
      }

      function routeKnowledgeLabel(value) {
        return { heard: "聽聞", known: "已知", verified: "已驗證" }[value] || "已知";
      }

      function formatStringList(value) {
        return Array.isArray(value) && value.length ? value.map(display).join("、") : undefined;
      }

      function mapKindLabel(value) {
        return { region: "區域", town: "城鎮", place: "地點", subplace: "子地點" }[value] || "地點";
      }

      function discoveryLabel(value) {
        return { heard: "聽聞", known: "已知", visited: "已造訪", surveyed: "已勘查" }[value] || "已知";
      }

      function dangerLabel(value) {
        return { unknown: "未知", low: "低", moderate: "中等", high: "高", extreme: "極高" }[value] || "未知";
      }

      function familiarityLabel(value) {
        return { heard: "僅聽聞", met: "見過", acquainted: "認識", familiar: "熟悉", trusted: "信任" }[value] || "已知";
      }

      function compendiumCategoryLabel(value) {
        return {
          creature: "生物", plant: "植物", material: "素材", magical_phenomenon: "魔法現象",
          faction: "勢力", culture: "文化", other: "其他",
        }[value] || "其他";
      }

      function knowledgeStageLabel(value) {
        return { rumor: "傳聞", observed: "觀察", identified: "辨識", verified: "驗證", researched: "研究" }[value] || "傳聞";
      }

      function confidenceLabel(value) {
        return { low: "低", medium: "中等", high: "高", confirmed: "已確認" }[value] || "尚未確認";
      }

      function expandable({ title, badge, note, fields, extras }) {
        const details = el("details", "entity");
        const summary = el("summary", "entity-summary");
        summary.setAttribute("aria-label", `${title}，點擊查看詳細資料`);
        const heading = el("div", "entity-heading");
        heading.append(el("div", "entity-title", title));
        if (note) heading.append(el("div", "entity-preview", note));
        const meta = el("div", "entity-meta");
        if (badge) meta.append(el("span", "entity-badge", badge));
        meta.append(el("span", "chevron", "⌄"));
        summary.append(heading, meta);

        const body = el("div", "entity-body");
        const grid = el("div", "detail-grid");
        for (const item of fields) {
          if (!item || (!item.always && !present(item.value))) continue;
          const box = el("div", `detail${item.wide ? " wide" : ""}`);
          const value = present(item.value) ? display(item.value) : "尚未記錄";
          box.append(el("div", "detail-label", item.label), el("div", `detail-value${present(item.value) ? "" : " missing"}`, value));
          grid.append(box);
        }
        body.append(grid);
        if (extras.length) {
          body.append(el("div", "extra-title", "其他資料"));
          const extraGrid = el("div", "detail-grid");
          for (const [key, value] of extras) {
            const box = el("div", "detail");
            box.append(el("div", "detail-label", humanizeKey(key)), el("div", "detail-value", display(value)));
            extraGrid.append(box);
          }
          body.append(extraGrid);
        }
        details.append(summary, body);
        return details;
      }

      function field(label, value, always = false, wide = false) { return { label, value, always, wide }; }

      function extraFields(record, known) {
        const hidden = new Set(["instanceId", "templateId", "location", "equippedSlot", "categoryLabel", "uniqueHolderId", "uniqueScope"]);
        return Object.entries(asRecord(record))
          .filter(([key, value]) => !known.has(key) && !hidden.has(key) && !key.startsWith("_") && present(value))
          .sort(([a], [b]) => a.localeCompare(b, "zh-Hant"));
      }

      function normalizeCollection(value) {
        if (!Array.isArray(value)) return [];
        return value.map(item => typeof item === "object" && item !== null && !Array.isArray(item) ? item : { name: display(item) });
      }

      function normalizeNamedCollection(value) {
        if (Array.isArray(value)) return normalizeCollection(value);
        if (!value || typeof value !== "object") return [];
        return Object.entries(value).map(([name, raw]) => {
          if (raw && typeof raw === "object" && !Array.isArray(raw)) return { name, ...raw };
          return { name, level: raw };
        });
      }

      function normalizeEquipment(value, equippedItems) {
        if (!value || typeof value !== "object" || Array.isArray(value)) return [];
        const registry = asRecord(equippedItems);
        return Object.entries(value).map(([slot, raw]) => {
          const empty = raw == null || raw === "" || raw === "無" || raw === "未裝備";
          const referenced = typeof raw === "string" ? registry[raw] : undefined;
          const item = empty
            ? {}
            : referenced && typeof referenced === "object" && !Array.isArray(referenced)
              ? referenced
              : typeof raw === "object" && !Array.isArray(raw) ? raw : { name: raw };
          return { slot, slotLabel: equipmentSlotLabel(slot), item, empty };
        });
      }

      function equipmentSlotLabel(slot) {
        const labels = {
          mainHand: "主手", main_hand: "主手", weapon: "主手", offHand: "副手", off_hand: "副手",
          head: "頭部", helmet: "頭部", body: "身體", chest: "身體", armor: "身體",
          hands: "手部", gloves: "手部", legs: "腿部", pants: "腿部", feet: "足部", boots: "足部",
          accessory: "飾品", accessories: "飾品", ring: "戒指", necklace: "項鍊", cloak: "披風",
        };
        if (labels[slot]) return labels[slot];
        if (/[㐀-鿿]/u.test(slot)) return slot;
        console.warn(`[AEGIS i18n] 缺少裝備欄翻譯：${slot}`);
        return "自訂裝備欄";
      }

      function resourceValue(player, key) {
        const raw = player[key];
        if (raw && typeof raw === "object" && !Array.isArray(raw)) {
          const current = pick(raw, ["current", "value", "now", "目前值"]);
          const maximum = pick(raw, ["max", "maximum", "上限", "最大值"]);
          return formatPair(current, maximum) ?? "—";
        }
        const maximum = pick(player, [
          `max${key.toUpperCase()}`,
          `${key}Max`,
          `max${key[0].toUpperCase()}${key.slice(1)}`,
          `${key}_max`,
        ]);
        return formatPair(raw, maximum) ?? "—";
      }

      function skillCategoryOf(skill) {
        const raw = String(pick(skill, ["category", "type", "分類", "類型"]) || "other").trim();
        const aliases = {
          combat: "combat", "戰鬥": "combat", magic: "magic", "魔法": "magic",
          survival: "survival", "求生": "survival", production: "production", crafting: "production", "生產": "production",
          knowledge: "knowledge", "知識": "knowledge", social: "social", "社交": "social",
          special: "special", "特殊": "special", unique: "unique", "唯一": "unique", other: "other", "其他": "other",
        };
        return aliases[raw.toLowerCase()] || aliases[raw] || raw;
      }

      function skillCategoryLabel(skill) {
        const explicit = pick(skill, ["categoryLabel", "分類名稱"]);
        if (typeof explicit === "string" && /[㐀-鿿]/u.test(explicit)) return explicit;
        const id = skillCategoryOf(skill);
        const labels = {
          combat: "戰鬥", magic: "魔法", survival: "求生", production: "生產",
          knowledge: "知識", social: "社交", special: "特殊", unique: "唯一", other: "其他",
        };
        if (labels[id]) return labels[id];
        if (/[㐀-鿿]/u.test(id)) return id;
        console.warn(`[AEGIS i18n] 缺少技能分類翻譯：${id}`);
        return "其他";
      }

      function itemEffectLabel(item) {
        if (item.category === "consumable") return "使用效果";
        if (item.category === "equipment") return "裝備效果";
        if (item.category === "special") return "特殊用途與效果";
        const type = String(pick(item, ["type", "類型"]) || "").toLowerCase();
        return type === "tool" || type === "工具" ? "功能" : "用途";
      }

      function formatItemEffects(item) {
        const values = [];
        if (Array.isArray(item.effects)) values.push(...item.effects.map(formatEffect).filter(present));
        if (Array.isArray(item.modifiers)) values.push(...item.modifiers.map(formatModifier).filter(present));
        if (!values.length) {
          const legacy = pick(item, ["effect", "useEffect", "bonus", "bonuses", "效果", "使用效果", "裝備效果", "加成"]);
          if (present(legacy)) values.push(display(legacy));
        }
        return values.length ? values.join("\n") : undefined;
      }

      function formatSkillEffects(skill) {
        if (Array.isArray(skill.effects)) {
          const values = skill.effects.map(formatEffect).filter(present);
          if (values.length) return values.join("\n");
        }
        const legacy = pick(skill, ["effect", "效果", "技能效果"]);
        return present(legacy) ? display(legacy) : undefined;
      }

      function formatEffect(raw) {
        const effect = asRecord(raw);
        const type = String(effect.type || "").toLowerCase();
        const value = effect.value;
        const signed = typeof value === "number" ? `${value >= 0 ? "+" : ""}${formatMetric(value)}` : "";
        const labels = {
          restore_hunger: `飽食度 ${signed}`,
          restore_hydration: `補水度 ${signed}`,
          restore_hp: `生命 ${signed}`,
          restore_mp: `魔力 ${signed}`,
          restore_sp: `體力 ${signed}`,
        };
        if (labels[type] && signed) return labels[type];
        if (type === "unlock_action") return chineseText(effect.label, effect.description) || "解鎖一項特殊行動";
        if (type === "apply_status") return `獲得狀態：${chineseText(effect.statusName, effect.label) || "已記錄狀態"}`;
        if (type === "remove_status") return `移除狀態：${chineseText(effect.statusName, effect.label) || "已記錄狀態"}`;
        if (type === "modify_stat") return formatModifier(effect);
        return chineseText(effect.label, effect.description, effect.text) || "已記錄一項特殊效果";
      }

      function formatModifier(raw) {
        const modifier = asRecord(raw);
        const stat = localizedStat(modifier.stat);
        const value = modifier.value;
        const operation = String(modifier.operation || "add");
        if (!stat || typeof value !== "number") return chineseText(modifier.label, modifier.description) || "已記錄一項裝備修正";
        if (operation === "multiply") return `${stat} ×${formatMetric(value)}`;
        if (operation === "subtract") return `${stat} -${formatMetric(Math.abs(value))}`;
        return `${stat} ${value >= 0 ? "+" : ""}${formatMetric(value)}`;
      }

      function localizedStat(value) {
        if (typeof value !== "string" || !value) return "";
        const labels = {
          attack: "攻擊力", damage: "傷害", defense: "防禦力", armor: "護甲",
          hp: "生命", mp: "魔力", sp: "體力", hunger: "飽食度", hydration: "補水度",
          focus: "專注", action_efficiency: "行動效率", stamina_recovery: "體力恢復效率",
        };
        if (labels[value]) return labels[value];
        if (/[㐀-鿿]/u.test(value)) return value;
        console.warn(`[AEGIS i18n] 缺少能力值翻譯：${value}`);
        return "能力值";
      }

      function formatAcquisition(record, kind) {
        const acquisition = asRecord(record.acquisition);
        const rawSource = pick(record, ["source", "origin", "acquiredFrom", "learnedFrom", "來源", "取得方式", "習得方式"]);
        const type = String(acquisition.type || "").toLowerCase();
        if (type === "initial_item") return "初始物品";
        if (type === "initial_skill") return "初始技能";
        if (!type && typeof rawSource === "string" && /初始物品|角色創建|角色建立|旅行包/.test(rawSource) && kind === "item") return "初始物品";
        if (!type && typeof rawSource === "string" && /初始技能|角色創建|角色建立/.test(rawSource) && kind === "skill") return "初始技能";
        const labels = {
          shop_purchase: "商店購買", quest_reward: "任務獎勵", loot: "戰利品", gathering: "採集取得",
          crafting: "製作取得", npc_gift: "NPC 贈與", chest: "寶箱取得", world_event: "世界事件取得",
          mentor: "導師教授", insight: "自行領悟", book: "書籍學習", profession: "職業訓練",
          bloodline: "血統能力", contract: "契約取得", equipment_grant: "裝備賦予", recorded_source: "取得紀錄",
        };
        const base = labels[type];
        const sourceName = pick(acquisition, ["sourceName", "名稱"]);
        if (base && present(sourceName)) return `${base}：${display(sourceName)}`;
        if (base) return base;
        if (present(sourceName)) return display(sourceName);
        return present(rawSource) ? display(rawSource) : undefined;
      }

      function formatTags(value) {
        if (!Array.isArray(value) || !value.length) return undefined;
        return value.map(tag => {
          const fake = { category: tag };
          const localized = skillCategoryLabel(fake);
          return localized === "其他" && typeof tag === "string" && /[㐀-鿿]/u.test(tag) ? tag : localized;
        }).join("、");
      }

      function chineseText(...values) {
        return values.find(value => typeof value === "string" && /[㐀-鿿]/u.test(value));
      }

      function renderObject(root, object, emptyText) {
        root.replaceChildren();
        const entries = object && typeof object === "object" ? Object.entries(object) : [];
        if (!entries.length) return root.append(el("div", "empty", emptyText));
        for (const [key, value] of entries) root.append(row(humanizeKey(key), "", display(value)));
      }

      function renderHistory(root, items) {
        root.replaceChildren();
        if (!items.length) return root.append(el("div", "empty", "尚無事件紀錄"));
        items.slice().reverse().forEach(item => {
          const event = asRecord(item);
          const text = typeof item === "string" ? item : event.displayText || "發生了一項尚未分類的事件。";
          root.append(row(historyTypeLabel(event.type), "", text));
        });
      }

      function historyTypeLabel(type) {
        return {
          general: "事件", time_elapsed: "時間流逝", travel: "旅行", item_used: "使用物品",
          survival_changed: "生存狀態", quest_changed: "任務更新", location_discovered: "發現地點",
          npc_met: "遇見人物", npc_information_learned: "取得情報", npc_location_updated: "人物位置",
          compendium_updated: "圖鑑更新", container_refilled: "補充容器", equipment_changed: "裝備更新",
        }[type] || "事件";
      }

      function renderEntities(root, items, emptyText, map) {
        root.replaceChildren();
        if (!items.length) return root.append(el("div", "empty", emptyText));
        items.forEach(item => { const view = map(asRecord(item)); root.append(row(view.title, view.badge, view.note)); });
      }

      function row(title, badge, note) {
        const outer = el("div", "row");
        const head = el("div", "row-head");
        head.append(el("div", "row-title", String(title || "—")), el("div", "pill", present(badge) ? display(badge) : ""));
        outer.append(head);
        if (note) outer.append(el("div", "note", display(note)));
        return outer;
      }

      function el(tag, className, text) {
        const node = document.createElement(tag);
        if (className) node.className = className;
        if (text !== undefined) node.textContent = text;
        return node;
      }

      function svgEl(tag) { return document.createElementNS("http://www.w3.org/2000/svg", tag); }
      function truncateMapLabel(value) { return value.length > 10 ? `${value.slice(0, 9)}…` : value; }

      function asRecord(value) { return value && typeof value === "object" && !Array.isArray(value) ? value : {}; }

      function pick(record, keys) {
        const object = asRecord(record);
        for (const key of keys) if (Object.prototype.hasOwnProperty.call(object, key) && present(object[key])) return object[key];
        return undefined;
      }

      function present(value) { return value !== undefined && value !== null && value !== ""; }

      function display(value) {
        if (!present(value)) return "—";
        if (typeof value === "boolean") return value ? "是" : "否";
        if (Array.isArray(value)) return value.length ? value.map(display).join("、") : "—";
        if (typeof value === "object") {
          const entries = Object.entries(value);
          return entries.length ? entries.map(([key, child]) => `${humanizeKey(key)}：${display(child)}`).join("\n") : "—";
        }
        return localizePrimitive(value);
      }

      function formatPair(current, maximum) {
        if (!present(current) && !present(maximum)) return undefined;
        if (present(current) && present(maximum)) return `${display(current)}／${display(maximum)}`;
        return present(current) ? display(current) : `最大 ${display(maximum)}`;
      }

      function humanizeKey(key) {
        const labels = {
          id: "識別碼", name: "名稱", title: "名稱", qty: "數量", quantity: "數量", count: "數量",
          category: "分類", type: "類型", quality: "品質", rarity: "稀有度", description: "說明", info: "資訊",
          note: "備註", effect: "效果", effects: "效果", source: "來源", origin: "來源", value: "價值", price: "價格",
          weight: "重量", level: "等級", rank: "階級", cooldown: "冷卻時間", cost: "消耗", proficiency: "熟練度",
          attack: "攻擊力", damage: "傷害", defense: "防禦力", armor: "護甲", durability: "耐久度", maxDurability: "最大耐久度",
          hungerRestore: "飽食度恢復量", hydrationRestore: "補水度恢復量", usesRemaining: "剩餘容量／次數", maxUses: "最大容量／次數",
          refillable: "可重新補充", useRestrictions: "使用限制", extraEffect: "額外效果", state: "狀態",
          categoryLabel: "分類名稱", tags: "次級標籤", modifiers: "裝備修正", acquisition: "取得來源",
          operation: "運算方式", stat: "能力值", action: "解鎖行動", sourceName: "來源名稱", obtainedAtTick: "取得時間點",
          current: "目前值", max: "最大值", maximum: "最大值", status: "狀態", reason: "原因",
          requirements: "使用條件", equipmentSlot: "裝備欄位", equipmentSlots: "可裝備欄位",
          strength: "力量", dexterity: "敏捷", constitution: "體質", intelligence: "智力", wisdom: "感知", charisma: "魅力",
          vitality: "活力", agility: "靈巧", endurance: "耐力", spirit: "精神", luck: "幸運",
          mapId: "地圖識別碼", routeId: "路線識別碼", facilityId: "設施識別碼", dangerId: "危險識別碼",
          npcId: "人物識別碼", infoId: "情報識別碼", serviceId: "服務識別碼", memoryId: "記憶識別碼",
          questId: "任務識別碼", entryId: "圖鑑識別碼", factId: "知識識別碼", kind: "地點層級",
          parentMapId: "上層地點", discovery: "得知狀態", routes: "已知路線", facilities: "設施", knownDangers: "地點危險",
          identity: "身份", familiarity: "熟悉程度", relationship: "關係", knownInformation: "已知情報",
          services: "服務", memories: "重要互動", stage: "研究階段", confidence: "可信程度",
          facts: "已知事實", sources: "知識來源", estimatedMinutes: "預估分鐘", actualTravelMinutes: "實際旅行分鐘",
          danger: "路線危險程度", knowledgeStatus: "路線情報狀態", content: "情報內容", summary: "摘要",
        };
        if (labels[key]) return labels[key];
        if (/[㐀-鿿]/u.test(key)) return key;
        console.warn(`[AEGIS i18n] 缺少欄位翻譯：${key}`);
        return "擴充資料";
      }

      function localizePrimitive(value) {
        if (typeof value !== "string") return String(value);
        const labels = {
          consumable: "消耗品", equipment: "裝備", misc: "雜物", special: "特殊",
          combat: "戰鬥", magic: "魔法", survival: "求生", production: "生產", knowledge: "知識", social: "社交", unique: "唯一", other: "其他",
          good: "狀態良好", mild: "輕微", moderate: "明顯", severe: "嚴重", critical: "危急",
          inventory: "背包", equipped: "已裝備", available: "可使用", empty: "已用完", filled: "已補滿",
          active: "進行中", completed: "已完成", failed: "失敗", locked: "未解鎖",
          pending: "待處理", in_progress: "進行中", abandoned: "已放棄",
          poor: "粗劣", common: "普通", uncommon: "優良", rare: "稀有", epic: "史詩", legendary: "傳說",
          beginner: "初級", intermediate: "中級", advanced: "高級", master: "大師級",
          sunny: "晴朗", cloudy: "多雲", overcast: "陰", rainy: "雨", storm: "暴風雨", snow: "雪",
          add: "增加", subtract: "減少", multiply: "倍率調整",
          initial_item: "初始物品", initial_skill: "初始技能", recorded_source: "取得紀錄",
          normal: "一般", rest: "休息", sleep: "睡眠", travel: "旅行", running: "奔跑", heavy_labor: "重體力勞動",
          temperate: "溫和", hot: "炎熱", cold: "寒冷",
          region: "區域", town: "城鎮", place: "地點", subplace: "子地點",
          heard: "聽聞", known: "已知", visited: "已造訪", surveyed: "已勘查",
          unknown: "未知", low: "低", moderate: "中等", high: "高", extreme: "極高",
          met: "見過", acquainted: "認識", familiar: "熟悉", trusted: "信任",
          current: "目前位置", last_known: "最後已知", creature: "生物", plant: "植物",
          material: "素材", magical_phenomenon: "魔法現象", faction: "勢力", culture: "文化",
          rumor: "傳聞", observed: "觀察", identified: "辨識", verified: "驗證", researched: "研究",
          medium: "中等", confirmed: "已確認", observation: "親自觀察", identification: "辨識",
          research: "研究", npc: "人物告知", document: "文件", event: "事件", legacy_record: "既有紀錄",
          water_source: "水源", inn: "旅店", shop: "商店", open: "開放", closed: "關閉", restricted: "有限制",
          rough: "粗略", walk: "步行", ride: "騎乘", boat: "乘船", minor: "次要", important: "重要", major: "重大",
        };
        return labels[value] || value;
      }

      function setCount(id, value) { $(id).textContent = String(value); }
      function formatObjective(value) { return Array.isArray(value) ? value.map(display).join("、") : ""; }
      function formatDate(value) { const date = new Date(value); return Number.isNaN(date.valueOf()) ? String(value || "—") : date.toLocaleString("zh-TW"); }

      const sectionTabs = {
        character: ["overview", "inventory", "equipment", "skills"],
        adventure: ["quests", "map", "people"],
        knowledge: ["compendium"],
      };

      function activateTab(tab) {
        document.querySelectorAll("[data-tab]").forEach(item => item.setAttribute("aria-selected", String(item.dataset.tab === tab)));
        document.querySelectorAll(".panel").forEach(panel => panel.classList.toggle("active", panel.id === `panel-${tab}`));
      }

      function activateSection(section) {
        document.querySelectorAll("[data-section]").forEach(item => item.setAttribute("aria-selected", String(item.dataset.section === section)));
        document.querySelectorAll("[data-section-nav]").forEach(nav => { nav.hidden = nav.dataset.sectionNav !== section; });
        const active = document.querySelector(".panel.active")?.id.replace("panel-", "");
        if (!sectionTabs[section]?.includes(active)) activateTab(sectionTabs[section]?.[0]);
      }

      document.querySelectorAll("[data-section]").forEach(button => button.addEventListener("click", () => activateSection(button.dataset.section)));
      document.querySelectorAll("[data-tab]").forEach(button => button.addEventListener("click", () => activateTab(button.dataset.tab)));

      document.querySelectorAll("[data-map-view]").forEach(button => button.addEventListener("click", () => {
        mapView = button.dataset.mapView === "list" ? "list" : "graph";
        renderMapView();
      }));
      $("map-recenter").addEventListener("click", recenterMap);
      $("map-focus-current").addEventListener("click", () => {
        mapFocusId = String(mapLocationCache.mapId || "");
        renderMapView();
      });
      $("map-zoom-out").addEventListener("click", () => {
        const viewport = $("map-graph").querySelector(".map-svg > g");
        if (viewport) zoomMap(viewport, .82, $("map-graph").clientWidth / 2, $("map-graph").clientHeight / 2);
      });
      $("map-zoom-in").addEventListener("click", () => {
        const viewport = $("map-graph").querySelector(".map-svg > g");
        if (viewport) zoomMap(viewport, 1.2, $("map-graph").clientWidth / 2, $("map-graph").clientHeight / 2);
      });

      document.querySelectorAll("[data-inventory-category]").forEach(button => button.addEventListener("click", () => {
        inventoryCategory = button.dataset.inventoryCategory || "all";
        document.querySelectorAll("[data-inventory-category]").forEach(item => item.setAttribute("aria-selected", String(item === button)));
        renderInventoryCategory();
      }));

      void bridgeReady;

      const legacyOutput = window.openai?.toolOutput;
      if (legacyOutput) update({ structuredContent: legacyOutput });
    </script>
  </body>
</html>
